<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Data | SI Akademik</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container nav-wrapper">
            <div class="logo">🎓 SI Akademik</div>

            <input type="checkbox" id="cek-menu" hidden>
            <label for="cek-menu" class="menu-toggle">☰</label>

            <nav class="navbar">
                <a href="index.html">Beranda</a>
                <a href="input.html" class="active">Input Data</a>
                <a href="data.html">Data Tabel</a>
                <a href="#">Jadwal Kuliah</a>
                <a href="#">Nilai Akademik</a>
            </nav>
        </div>
    </header>

    <main class="page-content">
        <div class="container">
            <h2 class="section-title">Formulir Input Data Mahasiswa</h2>

            <form id="formInput" class="input-form">
                <div class="form-group">
                    <label for="nama">Nama Lengkap</label>
                    <input type="text" id="nama" placeholder="Masukkan nama lengkap" required>
                </div>

                <div class="form-group">
                    <label for="nim">NIM</label>
                    <input type="text" id="nim" placeholder="Masukkan Nomor Induk Mahasiswa" required>
                </div>

                <div class="form-group">
                    <label for="layanan">Jenis Layanan</label>
                    <select id="layanan" required>
                        <option value="">-- Pilih Jenis Layanan --</option>
                        <option value="Pendaftaran">Pendaftaran & Administrasi</option>
                        <option value="Konsultasi">Konsultasi Akademik</option>
                        <option value="Transkrip">Permohonan Transkrip/Nilai</option>
                        <option value="Beasiswa">Pengajuan Beasiswa</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="keterangan">Keterangan Tambahan</label>
                    <textarea id="keterangan" rows="4" placeholder="Tuliskan keterangan atau keperluan lain..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="reset" class="btn secondary-btn">Reset Form</button>
                    <button type="submit" class="btn primary-btn">Simpan Data</button>
                </div>
            </form>

            <a href="index.html" class="home-icon"><i class="fas fa-home"></i></a>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="copyright">
                <p>&copy; 2026 Sistem Informasi Akademik. Semua Hak Dilindungi.</p>
                <p>Dibuat oleh: Viriani Angel (241121724)</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
